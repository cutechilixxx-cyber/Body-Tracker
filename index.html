<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/822/822143.png">
    
    <title>Vitality OS | Elite Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0b1120;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
        }

        .light-theme {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --accent: #0ea5e9;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; padding: 40px; background: var(--card-bg); border-radius: 32px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* MAIN APP */
        #main-app { display: none; width: 100%; max-width: 480px; padding: 20px; padding-top: 60px; padding-bottom: 50px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-tool { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 12px; cursor: pointer; font-weight: 700; }

        .glass-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 25px; margin-bottom: 25px; }
        .scanner-zone { 
            width: 100%; height: 160px; background: var(--input-bg); border-radius: 24px; 
            border: 2px dashed var(--accent); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden;
        }
        .scan-line { display: none; position: absolute; width: 100%; height: 3px; background: var(--accent); box-shadow: 0 0 20px var(--accent); top: 0; animation: scanAnim 2s infinite linear; }
        @keyframes scanAnim { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        input, select { width: 100%; padding: 16px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 18px; outline: none; font-size: 16px; margin-top: 15px; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 18px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 15px; }
        
        .n-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 20px; margin-bottom: 15px; }
        .n-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .p-bar-bg { height: 10px; background: var(--input-bg); border-radius: 20px; overflow: hidden; }
        .p-bar-fill { height: 100%; border-radius: 20px; width: 0%; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .advice-box { background: rgba(0,0,0,0.1); padding: 14px; border-radius: 20px; font-size: 0.85rem; border-left: 4px solid var(--accent); margin-top: 15px; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="margin:0;">VITALITY OS</h1>
            <p style="color:var(--text-dim); margin-bottom: 25px;">Elite Nutrition Tracking</p>
            <input type="text" id="login-user" placeholder="Имя / Name">
            <input type="password" id="login-pass" placeholder="Пароль / Password">
            <button class="btn-main" onclick="handleLogin()">ВОЙТИ</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div>
                <span style="color:var(--text-dim); font-size: 0.8rem;">Welcome,</span>
                <h2 style="margin:0;">haykk! 👋</h2>
            </div>
            <div style="display:flex; gap:8px;">
                <button class="btn-tool" onclick="toggleTheme()">☀️</button>
                <button class="btn-tool" onclick="toggleLang()" id="lang-btn">EN</button>
                <button class="btn-tool" onclick="location.reload()">EXIT</button>
            </div>
        </div>

        <div class="glass-panel">
            <input type="file" id="ai-input" hidden accept="image/*">
            <div class="scanner-zone" onclick="document.getElementById('ai-input').click()">
                <div class="scan-line" id="line"></div>
                <div style="text-align: center;">
                    <span style="font-size: 1.5rem;">📸</span>
                    <div id="scan-label" style="font-weight: 800; margin-top: 8px;">ТАП ДЛЯ СКАНЕРА</div>
                </div>
            </div>
            <div id="ai-status" style="font-size: 0.75rem; color: var(--accent); margin-top: 10px; font-weight: 800;">СИСТЕМА ГОТОВА К АНАЛИЗУ...</div>
            <select id="food-select"></select>
            <div style="display:flex; gap:10px">
                <input type="number" id="weight-input" placeholder="Вес (г)">
                <button class="btn-main" style="width:100px" onclick="manualAdd()">ADD</button>
            </div>
        </div>

        <div id="nutrient-list"></div>
    </div>

<script>
    let currentLang = 'RU';
    const foods = [
        { id: 'broccoli', name: {RU: '🥦 Брокколи', EN: '🥦 Broccoli'}, iron: 0.7, mag: 21, vitC: 89 },
        { id: 'beef', name: {RU: '🥩 Говядина', EN: '🥩 Beef'}, iron: 2.6, mag: 20, vitC: 0 },
        { id: 'spinach', name: {RU: '🌿 Шпинат', EN: '🌿 Spinach'}, iron: 2.7, mag: 79, vitC: 28 },
        { id: 'orange', name: {RU: '🍊 Апельсин', EN: '🍊 Orange'}, iron: 0.1, mag: 10, vitC: 53 },
        { id: 'nuts', name: {RU: '🥜 Орехи', EN: '🥜 Nuts'}, iron: 3.7, mag: 158, vitC: 0 }
    ];

    const nutrients = [
        { id: 'Iron', emoji: '🥩', cur: 0, norm: 18, color: '#f87171', advice: {RU: 'Мясо и шпинат.', EN: 'Meat and spinach.'} },
        { id: 'Magnesium', emoji: '🌿', cur: 0, norm: 400, color: '#34d399', advice: {RU: 'Орехи и авокадо.', EN: 'Nuts and avocado.'} },
        { id: 'Vitamin C', emoji: '🍊', cur: 0, norm: 90, color: '#38bdf8', advice: {RU: 'Цитрусы и киви.', EN: 'Citrus and kiwi.'} }
    ];

    function handleLogin() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        initSelect(); render();
    }

    function toggleTheme() { document.body.classList.toggle('light-theme'); }

    function toggleLang() {
        currentLang = currentLang === 'RU' ? 'EN' : 'RU';
        document.getElementById('lang-btn').innerText = currentLang === 'RU' ? 'EN' : 'RU';
        initSelect(); render();
    }

    function initSelect() {
        document.getElementById('food-select').innerHTML = foods.map(f => `<option value="${f.id}">${f.name[currentLang]}</option>`).join('');
    }

    function render() {
        document.getElementById('nutrient-list').innerHTML = nutrients.map(n => {
            const p = Math.min(100, Math.round((n.cur / n.norm) * 100));
            return `
                <div class="n-card">
                    <div class="n-info">
                        <span style="font-weight: 800;">${n.emoji} ${n.id}</span>
                        <span style="font-weight: 900; color: ${n.color}">${p}%</span>
                    </div>
                    <div class="p-bar-bg"><div class="p-bar-fill" style="width: ${p}%; background: ${n.color}"></div></div>
                    <div class="advice-box">🤖 <b>ADVICE:</b> ${n.advice[currentLang]}</div>
                </div>`;
        }).join('');
    }

    document.getElementById('ai-input').addEventListener('change', function(e) {
        if (!e.target.files[0]) return;
        document.getElementById('line').style.display = 'block';
        setTimeout(() => {
            document.getElementById('line').style.display = 'none';
            addData('broccoli', 200);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        }, 2000);
    });

    function manualAdd() {
        const id = document.getElementById('food-select').value;
        const weight = document.getElementById('weight-input').value || 100;
        addData(id, weight);
        confetti();
    }

    function addData(id, weight) {
        const food = foods.find(f => f.id === id);
        nutrients[0].cur += (food.iron * weight) / 100;
        nutrients[1].cur += (food.mag * weight) / 100;
        nutrients[2].cur += (food.vitC * weight) / 100;
        render();
    }
</script>
</body>
</html>
