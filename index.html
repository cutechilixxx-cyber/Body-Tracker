<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vitality OS | Elite Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0b1120;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
            --success: #10b981;
            --danger: #ef4444;
        }

        .light-theme {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --accent: #0ea5e9;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; padding: 40px; background: var(--card-bg); border-radius: 32px; text-align: center; border: 1px solid var(--border); }
        
        #main-app { display: none; width: 100%; max-width: 480px; padding: 20px; padding-top: 60px; padding-bottom: 120px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-tool { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.8rem; }
        .btn-del { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }

        .streak-badge {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.4), rgba(245, 158, 11, 0.1));
            border: 1px solid rgba(245, 158, 11, 0.6);
            border-radius: 14px;
            padding: 5px 15px; margin-top: 10px;
        }

        .glass-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 25px; margin-bottom: 25px; }
        textarea { width: 100%; padding: 16px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 18px; outline: none; margin-top: 15px; resize: none; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 18px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 15px; }

        .n-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 20px; margin-bottom: 15px; }
        .n-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .clickable-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }

        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-inc { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .p-bar-bg { height: 10px; background: var(--input-bg); border-radius: 20px; overflow: hidden; margin-bottom: 10px; }
        .p-bar-fill { height: 100%; border-radius: 20px; transition: width 0.5s ease; }
        
        .week-chart { display: flex; justify-content: space-between; align-items: flex-end; height: 35px; margin-top: 10px; padding-top: 5px; border-top: 1px solid var(--border); }
        .day-column { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .day-bar { width: 8px; border-radius: 2px; min-height: 2px; }
        .day-label { font-size: 0.55rem; color: var(--text-dim); margin-top: 4px; font-weight: 700; }

        .history-item { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px 20px; border-radius: 22px; margin-bottom: 10px; border: 1px solid var(--border); }
        
        .save-container { position: fixed; bottom: 25px; left: 0; right: 0; display: flex; justify-content: center; z-index: 100; }
        .btn-save { background: var(--success); color: white; padding: 16px 45px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); }

        #auth-screen input { width: 100%; padding: 16px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 18px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>VITALITY OS</h1>
            <input type="text" id="id-user" placeholder="Name">
            <input type="password" id="id-pass" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div>
                <span style="color:var(--text-dim); font-size: 0.8rem;">Welcome,</span>
                <h2 style="margin:0;">haykk! 👋</h2>
                <div class="streak-badge"><span>🔥 3 DAY STREAK</span></div>
            </div>
            <div style="display:flex; gap:6px;">
                <button class="btn-tool" onclick="toggleTheme()">☀️</button>
                <button class="btn-tool" onclick="toggleLang()" id="lang-btn">EN</button>
                <button class="btn-tool btn-del" onclick="clearAllData()">RESET</button>
                <button class="btn-tool" onclick="location.reload()">EXIT</button>
            </div>
        </div>

        <div class="glass-panel">
            <textarea id="smart-input" placeholder="Smart AI: Paste nutrient info here..." rows="2"></textarea>
            <button class="btn-main" onclick="smartAnalyze()">ANALYZE DATA</button>
        </div>

        <div id="nutrient-list"></div>

        <div style="margin-top: 30px;">
            <h3 style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 15px;">RECENT ACTIVITY</h3>
            <div id="history-list"></div>
        </div>

        <div class="save-container">
            <button class="btn-save" onclick="syncAndReset()">
                <span id="save-text">💾 SAVE & SYNC</span>
            </button>
        </div>
    </div>

<script>
    let currentLang = 'EN';
    let history = [];
    const dayNamesRU = ['ВС','ПН','ВТ','СР','ЧТ','ПТ','СБ'];
    const dayNamesEN = ['SU','MO','TU','WE','TH','FR','SA'];

    let nutrients = [
        { key: 'iron', id: 'Iron', emoji: '🥩', cur: 0, norm: 18, color: '#f87171', weekly: [0,0,0,0,0,0,0], info: "Мясо, шпинат, чечевица." },
        { key: 'mag', id: 'Magnesium', emoji: '🌿', cur: 0, norm: 400, color: '#34d399', weekly: [0,0,0,0,0,0,0], info: "Орехи, семена, шоколад." },
        { key: 'vitC', id: 'Vitamin C', emoji: '🍊', cur: 0, norm: 90, color: '#38bdf8', weekly: [0,0,0,0,0,0,0], info: "Цитрусовые, перец, киви." },
        { key: 'vitB12', id: 'Vitamin B12', emoji: '🧬', cur: 0, norm: 2.4, color: '#a78bfa', weekly: [0,0,0,0,0,0,0], info: "Морепродукты, мясо, яйца." },
        { key: 'vitD3', id: 'Vitamin D3', emoji: '☀️', cur: 0, norm: 600, color: '#fbbf24', weekly: [0,0,0,0,0,0,0], info: "Солнце, жирная рыба, желток." },
        { key: 'zinc', id: 'Zinc', emoji: '🐚', cur: 0, norm: 11, color: '#94a3b8', weekly: [0,0,0,0,0,0,0], info: "Устрицы, семечки, говядина." },
        { key: 'calcium', id: 'Calcium', emoji: '🥛', cur: 0, norm: 1000, color: '#e2e8f0', weekly: [0,0,0,0,0,0,0], info: "Молоко, сыр, кунжут." },
        { key: 'omega', id: 'Omega-3', emoji: '🐟', cur: 0, norm: 1000, color: '#f472b6', weekly: [0,0,0,0,0,0,0], info: "Рыба, чиа, грецкие орехи." },
        { key: 'vitA', id: 'Vitamin A', emoji: '🥕', cur: 0, norm: 900, color: '#fb923c', weekly: [0,0,0,0,0,0,0], info: "Морковь, печень, тыква." },
        { key: 'vitE', id: 'Vitamin E', emoji: '🌻', cur: 0, norm: 15, color: '#a3e635', weekly: [0,0,0,0,0,0,0], info: "Масла, миндаль, шпинат." },
        { key: 'iodine', id: 'Iodine', emoji: '🌊', cur: 0, norm: 150, color: '#60a5fa', weekly: [0,0,0,0,0,0,0], info: "Водоросли, морепродукты." },
        { key: 'potassium', id: 'Potassium', emoji: '🍌', cur: 0, norm: 3500, color: '#facc15', weekly: [0,0,0,0,0,0,0], info: "Бананы, картофель, курага." }
    ];

    function handleLogin() {
        const saved = localStorage.getItem('vitality_final');
        if(saved) {
            const data = JSON.parse(saved);
            nutrients.forEach(n => {
                const s = data.nutrients.find(dn => dn.key === n.key);
                if(s) { n.cur = s.cur; n.weekly = s.weekly; }
            });
            history = data.history || [];
            currentLang = data.lang || 'EN';
        }
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('lang-btn').innerText = currentLang;
        render();
    }

    function showInfo(key) {
        const n = nutrients.find(i => i.key === key);
        alert(`${n.emoji} ${n.id} RECOMMENDATION:\n\nEat: ${n.info}`);
    }

    // ИСПРАВЛЕННАЯ ФУНКЦИЯ RESET
    function clearAllData() {
        if(confirm("Are you sure you want to delete everything?")) {
            localStorage.removeItem('vitality_final');
            location.reload();
        }
    }

    function smartAnalyze() {
        const input = document.getElementById('smart-input').value;
        if(!input) return;
        adjustValue('iron', 2); 
        document.getElementById('smart-input').value = '';
        render();
    }

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    
    function toggleLang() {
        currentLang = (currentLang === 'EN') ? 'RU' : 'EN';
        document.getElementById('lang-btn').innerText = currentLang;
        saveToLocal();
        render();
    }

    function adjustValue(key, delta) {
        const n = nutrients.find(i => i.key === key);
        const dayIdx = new Date().getDay();
        let step = (key === 'vitB12') ? 0.1 : 1;
        n.cur = parseFloat((Math.max(0, n.cur + (delta * step))).toFixed(2));
        n.weekly[dayIdx] = n.cur;
        if (delta > 0 && n.cur >= n.norm) confetti();
        saveToLocal();
        render();
    }

    function syncAndReset() {
        const now = new Date();
        const dayIdx = now.getDay();
        const dayName = dayNamesEN[dayIdx];
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const logs = nutrients.filter(n => n.cur > 0).map(n => n.id).join(', ');
        
        history.unshift({ name: `Sync (${dayName})`, weight: logs || "Daily Sync", time: timeStr });
        nutrients.forEach(n => { n.cur = 0; });

        saveToLocal();
        const btnText = document.getElementById('save-text');
        btnText.innerText = "✅ SYNCED FOR NEXT LOG";
        confetti();
        setTimeout(() => { btnText.innerText = "💾 SAVE & SYNC"; render(); }, 2000);
    }

    function saveToLocal() {
        const data = { nutrients, history, lang: currentLang };
        localStorage.setItem('vitality_final', JSON.stringify(data));
    }

    function render() {
        const list = document.getElementById('nutrient-list');
        const days = currentLang === 'RU' ? dayNamesRU : dayNamesEN;
        
        list.innerHTML = nutrients.map(n => {
            const p = Math.min(100, Math.round((n.cur/n.norm)*100));
            return `
            <div class="n-card">
                <div class="n-info">
                    <div class="clickable-label" onclick="showInfo('${n.key}')">
                        <span style="font-size:1.2rem">${n.emoji}</span>
                        <span style="font-weight:800">${n.id}</span>
                    </div>
                    <div class="controls">
                        <button class="btn-inc" onclick="adjustValue('${n.key}', -1)">-</button>
                        <span style="font-weight:900; color:${n.color}; min-width:40px; text-align:center">${p}%</span>
                        <button class="btn-inc" onclick="adjustValue('${n.key}', 1)">+</button>
                    </div>
                </div>
                <div class="p-bar-bg"><div class="p-bar-fill" style="width:${p}%; background:${n.color}"></div></div>
                <div class="week-chart">
                    ${n.weekly.map((v, i) => `
                        <div class="day-column">
                            <div class="day-bar" style="height:${Math.min(100, (v/n.norm)*100)}%; background:${n.color}; opacity:${v>0?1:0.2}"></div>
                            <div class="day-label">${days[i]}</div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }).join('');

        const hList = document.getElementById('history-list');
        hList.innerHTML = history.map(h => `
            <div class="history-item">
                <div><b>${h.name}</b><br><small style="color:var(--text-dim)">${h.weight}</small></div>
                <div style="color:var(--accent); font-weight:900">${h.time}</div>
            </div>
        `).join('') || '<p style="text-align:center; color:var(--text-dim)">Ready for logs</p>';
    }
</script>
</body>
</html>
