<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/822/822143.png">
    
    <title>Vitality OS | Elite Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0b1120;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
        }

        .light-theme {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --accent: #0ea5e9;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; padding: 40px; background: var(--card-bg); border-radius: 32px; text-align: center; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* MAIN APP */
        #main-app { display: none; width: 100%; max-width: 480px; padding: 20px; padding-top: 60px; padding-bottom: 50px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-tool { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 12px; cursor: pointer; font-weight: 700; }

        .glass-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 25px; margin-bottom: 25px; }
        .scanner-zone { 
            width: 100%; height: 160px; background: var(--input-bg); border-radius: 24px; 
            border: 2px dashed var(--accent); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden;
        }
        .scan-line { display: none; position: absolute; width: 100%; height: 3px; background: var(--accent); box-shadow: 0 0 20px var(--accent); top: 0; animation: scanAnim 2s infinite linear; }
        @keyframes scanAnim { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        input, select { width: 100%; padding: 16px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 18px; outline: none; font-size: 16px; margin-top: 15px; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 18px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 15px; }
        
        .n-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 20px; margin-bottom: 15px; }
        .n-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .p-bar-bg { height: 10px; background: var(--input-bg); border-radius: 20px; overflow: hidden; }
        .p-bar-fill { height: 100%; border-radius: 20px; width: 0%; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        .advice-box { background: rgba(0,0,0,0.1); padding: 14px; border-radius: 20px; font-size: 0.85rem; border-left: 4px solid var(--accent); margin-top: 15px; display: flex; gap: 10px; }

        /* HISTORY SECTION */
        .history-section { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .history-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--card-bg); padding: 15px 20px; border-radius: 20px; 
            margin-bottom: 10px; border: 1px solid var(--border); font-size: 0.9rem;
        }
        .history-time { color: var(--text-dim); font-size: 0.75rem; }
        .btn-hist { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; width: 30px; height: 30px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .btn-del { color: #f87171; background: none; border: none; font-size: 1.2rem; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="margin:0;">VITALITY OS</h1>
            <p style="color:var(--text-dim); margin-bottom: 25px;">Elite Nutrition Tracking</p>
            <input type="text" id="login-user" placeholder="Имя / Name">
            <input type="password" id="login-pass" placeholder="Пароль / Password">
            <button class="btn-main" onclick="handleLogin()">ВОЙТИ</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div>
                <span style="color:var(--text-dim); font-size: 0.8rem;">Welcome,</span>
                <h2 style="margin:0;">haykk! 👋</h2>
            </div>
            <div style="display:flex; gap:8px;">
                <button class="btn-tool" onclick="toggleTheme()">☀️</button>
                <button class="btn-tool" onclick="toggleLang()" id="lang-btn">EN</button>
                <button class="btn-tool" onclick="location.reload()">EXIT</button>
            </div>
        </div>

        <div class="glass-panel">
            <input type="file" id="ai-input" hidden accept="image/*">
            <div class="scanner-zone" onclick="document.getElementById('ai-input').click()">
                <div class="scan-line" id="line"></div>
                <div style="text-align: center;">
                    <span style="font-size: 1.5rem;">📸</span>
                    <div id="scan-label" style="font-weight: 800; margin-top: 8px;">ТАП ДЛЯ СКАНЕРА</div>
                </div>
            </div>
            <div id="ai-status" style="font-size: 0.75rem; color: var(--accent); margin-top: 10px; font-weight: 800;">СИСТЕМА ГОТОВА К АНАЛИЗУ...</div>
            <select id="food-select"></select>
            <div style="display:flex; gap:10px">
                <input type="number" id="weight-input" placeholder="Вес (г)">
                <button class="btn-main" style="width:100px" onclick="manualAdd()">ADD</button>
            </div>
        </div>

        <div id="nutrient-list"></div>

        <div class="history-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0; color: var(--text-dim);">STATS HISTORY</h3>
                <button class="btn-tool" onclick="clearFullStats()" style="font-size: 0.7rem;">CLEAR ALL</button>
            </div>
            <div id="history-list">
                <p style="text-align:center; color: var(--text-dim); font-size: 0.8rem;">No activity yet</p>
            </div>
        </div>
    </div>

<script>
    let currentLang = 'RU';
    let history = [];
    
    const foods = [
        { id: 'broccoli', name: {RU: '🥦 Брокколи', EN: '🥦 Broccoli'}, iron: 0.7, mag: 21, vitC: 89, vitA: 31, vitD: 0, vitE: 0.17, vitK: 102, vitB12: 0 },
        { id: 'beef', name: {RU: '🥩 Говядина', EN: '🥩 Beef'}, iron: 2.6, mag: 20, vitC: 0, vitA: 0, vitD: 0.1, vitE: 0.1, vitK: 1.1, vitB12: 2.6 },
        { id: 'spinach', name: {RU: '🌿 Шпинат', EN: '🌿 Spinach'}, iron: 2.7, mag: 79, vitC: 28, vitA: 469, vitD: 0, vitE: 2, vitK: 483, vitB12: 0 },
        { id: 'orange', name: {RU: '🍊 Апельсин', EN: '🍊 Orange'}, iron: 0.1, mag: 10, vitC: 53, vitA: 11, vitD: 0, vitE: 0.18, vitK: 0, vitB12: 0 },
        { id: 'salmon', name: {RU: '🐟 Лосось', EN: '🐟 Salmon'}, iron: 0.3, mag: 27, vitC: 0, vitA: 12, vitD: 11, vitE: 1.1, vitK: 0.5, vitB12: 3.2 },
        { id: 'eggs', name: {RU: '🥚 Яйца', EN: '🥚 Eggs'}, iron: 1.2, mag: 10, vitC: 0, vitA: 140, vitD: 2, vitE: 1.1, vitK: 0.3, vitB12: 1.1 },
        { id: 'nuts', name: {RU: '🥜 Орехи', EN: '🥜 Nuts'}, iron: 3.7, mag: 158, vitC: 0, vitA: 1, vitD: 0, vitE: 25, vitK: 2.7, vitB12: 0 }
    ];

    const nutrients = [
        { key: 'iron', id: 'Iron', emoji: '🥩', cur: 0, norm: 18, color: '#f87171', advice: {RU: 'Мясо и шпинат.', EN: 'Meat and spinach.'} },
        { key: 'mag', id: 'Magnesium', emoji: '🌿', cur: 0, norm: 400, color: '#34d399', advice: {RU: 'Орехи и авокадо.', EN: 'Nuts and avocado.'} },
        { key: 'vitC', id: 'Vitamin C', emoji: '🍊', cur: 0, norm: 90, color: '#38bdf8', advice: {RU: 'Цитрусы и киви.', EN: 'Citrus and kiwi.'} },
        { key: 'vitA', id: 'Vitamin A', emoji: '🥕', cur: 0, norm: 900, color: '#fb923c', advice: {RU: 'Морковь и печень.', EN: 'Carrots and liver.'} },
        { key: 'vitD', id: 'Vitamin D3', emoji: '☀️', cur: 0, norm: 15, color: '#facc15', advice: {RU: 'Рыба и солнце.', EN: 'Fish and sun.'} },
        { key: 'vitE', id: 'Vitamin E', emoji: '🌻', cur: 0, norm: 15, color: '#f472b6', advice: {RU: 'Масла и орехи.', EN: 'Oils and nuts.'} },
        { key: 'vitK', id: 'Vitamin K', emoji: '🥬', cur: 0, norm: 120, color: '#a3e635', advice: {RU: 'Зелень и брокколи.', EN: 'Greens and broccoli.'} },
        { key: 'vitB12', id: 'Vitamin B12', emoji: '🧬', cur: 0, norm: 2.4, color: '#a78bfa', advice: {RU: 'Мясо и яйца.', EN: 'Meat and eggs.'} }
    ];

    function handleLogin() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        initSelect(); render(); renderHistory();
    }

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function toggleLang() {
        currentLang = currentLang === 'RU' ? 'EN' : 'RU';
        document.getElementById('lang-btn').innerText = currentLang === 'RU' ? 'EN' : 'RU';
        initSelect(); render(); renderHistory();
    }

    function initSelect() {
        document.getElementById('food-select').innerHTML = foods.map(f => `<option value="${f.id}">${f.name[currentLang]}</option>`).join('');
    }

    function render() {
        document.getElementById('nutrient-list').innerHTML = nutrients.map((n, index) => {
            const p = Math.min(100, Math.round((n.cur / n.norm) * 100));
            return `
                <div class="n-card">
                    <div class="n-info">
                        <span style="font-weight: 800;">${n.emoji} ${n.id}</span>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <button class="btn-hist" onclick="adjustNutrient(${index}, -0.5)">-</button>
                            <span style="font-weight: 900; color: ${n.color}; min-width: 40px; text-align: center;">${p}%</span>
                            <button class="btn-hist" onclick="adjustNutrient(${index}, 0.5)">+</button>
                        </div>
                    </div>
                    <div class="p-bar-bg"><div class="p-bar-fill" style="width: ${p}%; background: ${n.color}"></div></div>
                    <div class="advice-box">🤖 <b>ADVICE:</b> ${n.advice[currentLang]}</div>
                </div>`;
        }).join('');
    }

    function adjustNutrient(index, amount) {
        nutrients[index].cur = Math.max(0, nutrients[index].cur + amount);
        render();
    }

    function renderHistory() {
        const container = document.getElementById('history-list');
        if (history.length === 0) {
            container.innerHTML = `<p style="text-align:center; color: var(--text-dim); font-size: 0.8rem;">No activity yet</p>`;
            return;
        }
        
        container.innerHTML = history.map((item, index) => `
            <div class="history-item">
                <div>
                    <div style="font-weight: 800;">${item.name}</div>
                    <div class="history-time">${item.time}</div>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <button class="btn-hist" onclick="changeEntry(${index}, -10)">-</button>
                    <div style="color: var(--accent); font-weight: 900; min-width: 40px; text-align: center;">+${item.weight}g</div>
                    <button class="btn-hist" onclick="changeEntry(${index}, 10)">+</button>
                    <button class="btn-del" onclick="deleteEntry(${index})">×</button>
                </div>
            </div>
        `).join('');
    }

    function addData(id, weight) {
        const food = foods.find(f => f.id === id);
        weight = parseInt(weight);
        nutrients.forEach(n => { if (food[n.key] !== undefined) n.cur += (food[n.key] * weight) / 100; });

        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        history.unshift({ id: id, name: food.name[currentLang], weight: weight, time: timeStr });

        render(); renderHistory();
    }

    function changeEntry(index, amount) {
        const item = history[index];
        const food = foods.find(f => f.id === item.id);
        
        if (item.weight + amount <= 0) return deleteEntry(index);

        nutrients.forEach(n => { if (food[n.key] !== undefined) n.cur += (food[n.key] * amount) / 100; });
        item.weight += amount;
        
        render(); renderHistory();
    }

    function deleteEntry(index) {
        const item = history[index];
        const food = foods.find(f => f.id === item.id);
        nutrients.forEach(n => { if (food[n.key] !== undefined) n.cur -= (food[n.key] * item.weight) / 100; });
        history.splice(index, 1);
        render(); renderHistory();
    }

    function clearFullStats() {
        if(confirm('Clear all?')) { history = []; nutrients.forEach(n => n.cur = 0); render(); renderHistory(); }
    }

    function manualAdd() {
        const id = document.getElementById('food-select').value;
        const weight = document.getElementById('weight-input').value || 100;
        addData(id, weight); confetti();
    }

    document.getElementById('ai-input').addEventListener('change', function(e) {
        if (!e.target.files[0]) return;
        document.getElementById('line').style.display = 'block';
        setTimeout(() => {
            document.getElementById('line').style.display = 'none';
            addData('broccoli', 200);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        }, 2000);
    });
</script>
</body>
</html>
