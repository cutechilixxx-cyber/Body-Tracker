<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Body Elements Tracker</title>
  <style>
    body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
    .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #2a7cff; }
    .element-card { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ddd; }
    .header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
    .bar-bg { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin: 10px 0; }
    .bar-fill { height: 100%; background: #2a7cff; transition: width 0.3s; }
    .controls { display: flex; align-items: center; justify-content: space-between; }
    .btns { display: flex; align-items: center; gap: 10px; }
    button { width: 35px; height: 35px; border-radius: 50%; border: none; background: #2a7cff; color: white; cursor: pointer; font-size: 18px; }
    button:active { transform: scale(0.9); }
    .norm { font-size: 12px; color: #666; }
  </style>
</head>
<body>

<div class="container">
  <h1>Body Elements</h1>
  <div id="app"></div>
</div>

<script>
  // 1. Начальные данные (Добавляй новые витамины сюда)
  const defaultElements = [
    { name: 'Iron', current: 0, norm: 18, unit: 'mg' },
    { name: 'Magnesium', current: 0, norm: 400, unit: 'mg' },
    { name: 'Calcium', current: 0, norm: 1000, unit: 'mg' },
    { name: 'Vitamin C', current: 0, norm: 90, unit: 'mg' },
    { name: 'Vitamin D', current: 0, norm: 20, unit: 'mcg' },
    { name: 'Vitamin B12', current: 0, norm: 2.4, unit: 'mcg' },
    { name: 'Zinc', current: 0, norm: 11, unit: 'mg' },
    { name: 'Potassium', current: 0, norm: 4700, unit: 'mg' },
    { name: 'Omega-3', current: 0, norm: 1000, unit: 'mg' }
  ];
  // 2. ЗАГРУЗКА из памяти
  // 2. УМНАЯ ЗАГРУЗКА
  let state;
  try {
    const saved = localStorage.getItem('myTrackerData');
    if (saved) {
      const savedData = JSON.parse(saved);
      // Смешиваем: берем всё из defaultElements, но если в памяти есть прогресс — подставляем его
      state = defaultElements.map(defaultItem => {
        const savedItem = savedData.find(s => s.name === defaultItem.name);
        return savedItem ? { ...defaultItem, current: savedItem.current } : defaultItem;
      });
    } else {
      state = defaultElements;
    }
  } catch (e) {
    state = defaultElements;
  }
  // 3. ФУНКЦИЯ ОТРИСОВКИ
  function render() {
    const app = document.getElementById('app');
    app.innerHTML = '';

    state.forEach((el, index) => {
      const percent = Math.min(100, Math.round((el.current / el.norm) * 100));
      
      const card = document.createElement('div');
      card.className = 'element-card';
      card.innerHTML = `
        <div class="header"><span>${el.name}</span><span>${percent}%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width: ${percent}%"></div></div>
        <div class="controls">
          <div class="btns">
            <button onclick="change(${index}, -1)">-</button>
            <span><b>${el.current}</b> ${el.unit}</span>
            <button onclick="change(${index}, 1)">+</button>
          </div>
          <span class="norm">Norm: ${el.norm}</span>
        </div>
      `;
      app.appendChild(card);
    });
  }

  // 4. ИЗМЕНЕНИЕ И СОХРАНЕНИЕ
  window.change = function(index, delta) {
    state[index].current += delta;
    if (state[index].current < 0) state[index].current = 0;
    
    // Сохраняем в localStorage
    localStorage.setItem('myTrackerData', JSON.stringify(state));
    render();
  };

  render();
</script>

</body>
</html>
