<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vitality OS | Elite Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #0b1120;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
            --success: #10b981;
        }

        .light-theme {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --accent: #0ea5e9;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; padding: 40px; background: var(--card-bg); border-radius: 32px; text-align: center; border: 1px solid var(--border); }
        
        #main-app { display: none; width: 100%; max-width: 480px; padding: 20px; padding-top: 60px; padding-bottom: 100px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-tool { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 12px; cursor: pointer; font-weight: 700; }

        .streak-badge {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.4), rgba(245, 158, 11, 0.1));
            border: 1px solid rgba(245, 158, 11, 0.6);
            border-radius: 14px;
            padding: 5px 15px;
            margin-top: 10px;
        }
        .streak-badge span { color: #fff; font-weight: 900; font-size: 0.85rem; }
        .flame-icon { margin-right: 6px; }

        .glass-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 25px; margin-bottom: 25px; }
        
        input, textarea { width: 100%; padding: 16px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 18px; outline: none; margin-top: 15px; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 18px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 15px; }
        
        .n-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 20px; margin-bottom: 15px; }
        .n-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-inc { 
            background: var(--input-bg); border: 1px solid var(--border); color: var(--text); 
            width: 32px; height: 32px; border-radius: 10px; cursor: pointer; font-weight: bold; 
            display: flex; align-items: center; justify-content: center;
        }

        .p-bar-bg { height: 10px; background: var(--input-bg); border-radius: 20px; overflow: hidden; }
        .p-bar-fill { height: 100%; border-radius: 20px; width: 0%; transition: width 0.6s ease; }
        
        .week-chart { display: flex; justify-content: space-between; align-items: flex-end; height: 40px; margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border); }
        .day-column { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .day-bar { width: 8px; border-radius: 2px; min-height: 2px; }
        .day-label { font-size: 0.5rem; color: var(--text-dim); margin-top: 4px; font-weight: 700; }

        .history-section { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .history-item { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 12px 20px; border-radius: 20px; margin-bottom: 8px; font-size: 0.85rem; border: 1px solid var(--border); }
        
        .save-container { position: fixed; bottom: 25px; left: 0; right: 0; display: flex; justify-content: center; z-index: 100; }
        .btn-save { 
            background: var(--success); color: white; padding: 16px 45px; border-radius: 50px; 
            font-weight: 900; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }

        /* Добавлено для кликабельности */
        .nutrient-title-btn { 
            background: none; border: none; color: inherit; font: inherit; 
            cursor: pointer; padding: 0; display: flex; align-items: center; gap: 8px; 
        }
        .nutrient-title-btn:active { opacity: 0.6; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>VITALITY OS</h1>
            <input type="text" id="login-user" placeholder="Name">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div>
                <span style="color:var(--text-dim); font-size: 0.8rem;">Welcome,</span>
                <h2 style="margin:0;">haykk! 👋</h2>
                <div class="streak-badge">
                    <span class="flame-icon">🔥</span> <span id="streak-val">3 DAY STREAK</span>
                </div>
            </div>
            <div style="display:flex; gap:8px;">
                <button class="btn-tool" onclick="toggleTheme()">☀️</button>
                <button class="btn-tool" onclick="toggleLang()" id="lang-btn">EN</button>
                <button class="btn-tool" onclick="location.reload()">EXIT</button>
            </div>
        </div>

        <div class="glass-panel">
            <textarea id="smart-input" placeholder="Smart AI: Paste nutrient info here..." rows="2"></textarea>
            <button class="btn-main" onclick="smartAnalyze()">ANALYZE DATA</button>
        </div>

        <div id="nutrient-list"></div>

        <div class="history-section">
            <h3 style="color: var(--text-dim); font-size: 0.9rem;">RECENT ACTIVITY</h3>
            <div id="history-list"></div>
        </div>

        <div class="save-container">
            <button class="btn-save" onclick="saveData()">
                <span>💾</span> <span id="save-text">SAVE & SYNC</span>
            </button>
        </div>
    </div>

<script>
    let currentLang = 'RU';
    let history = [];
    const dayNames = { RU: ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'], EN: ['MO','TU','WE','TH','FR','SA','SU'] };

    // Полный список с рекомендациями
    let nutrients = [
        { key: 'iron', id: 'Iron', emoji: '🥩', cur: 0, norm: 18, color: '#f87171', weekly: [0,0,0,0,0,0,0], info: "🥩 Говядина, печень, шпинат, чечевица, морепродукты." },
        { key: 'mag', id: 'Magnesium', emoji: '🌿', cur: 0, norm: 400, color: '#34d399', weekly: [0,0,0,0,0,0,0], info: "🌿 Орехи, семена тыквы, темный шоколад, авокадо." },
        { key: 'vitC', id: 'Vitamin C', emoji: '🍊', cur: 0, norm: 90, color: '#38bdf8', weekly: [0,0,0,0,0,0,0], info: "🍊 Болгарский перец, киви, цитрусовые, брокколи." },
        { key: 'vitB12', id: 'Vitamin B12', emoji: '🧬', cur: 0, norm: 2.4, color: '#a78bfa', weekly: [0,0,0,0,0,0,0], info: "🧬 Мясо, рыба, яйца, молочные продукты." },
        { key: 'vitD3', id: 'Vitamin D3', emoji: '☀️', cur: 0, norm: 600, color: '#fbbf24', weekly: [0,0,0,0,0,0,0], info: "☀️ Жирная рыба, печень трески, яичный желток." },
        { key: 'zinc', id: 'Zinc', emoji: '🐚', cur: 0, norm: 11, color: '#94a3b8', weekly: [0,0,0,0,0,0,0], info: "🐚 Устрицы, мясо, тыквенные семечки, бобовые." },
        { key: 'calcium', id: 'Calcium', emoji: '🥛', cur: 0, norm: 1000, color: '#e2e8f0', weekly: [0,0,0,0,0,0,0], info: "🥛 Сыр, кунжут, творог, миндаль, петрушка." },
        { key: 'omega', id: 'Omega-3', emoji: '🐟', cur: 0, norm: 1000, color: '#f472b6', weekly: [0,0,0,0,0,0,0], info: "🐟 Рыбий жир, льняное семя, грецкие орехи." },
        { key: 'vitA', id: 'Vitamin A', emoji: '🥕', cur: 0, norm: 900, color: '#fb923c', weekly: [0,0,0,0,0,0,0], info: "🥕 Морковь, тыква, сливочное масло." },
        { key: 'vitE', id: 'Vitamin E', emoji: '🌻', cur: 0, norm: 15, color: '#a3e635', weekly: [0,0,0,0,0,0,0], info: "🌻 Масла холодного отжима, фундук, семечки." },
        { key: 'iodine', id: 'Iodine', emoji: '🌊', cur: 0, norm: 150, color: '#60a5fa', weekly: [0,0,0,0,0,0,0], info: "🌊 Морская капуста, морепродукты, йодированная соль." },
        { key: 'potassium', id: 'Potassium', emoji: '🍌', cur: 0, norm: 3500, color: '#facc15', weekly: [0,0,0,0,0,0,0], info: "🍌 Бананы, печеный картофель, курага." }
    ];

    function handleLogin() {
        const savedRaw = localStorage.getItem('vitality_elite_data');
        if(savedRaw) {
            const data = JSON.parse(savedRaw);
            data.nutrients.forEach(saved => {
                const target = nutrients.find(n => n.key === saved.key);
                if(target) { target.cur = saved.cur; target.weekly = saved.weekly; }
            });
            history = data.history || [];
        }
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        render();
    }

    // ТА САМАЯ ФУНКЦИЯ ДЛЯ РЕКОМЕНДАЦИЙ
    function showRecommendation(key) {
        const n = nutrients.find(item => item.key === key);
        alert(`💡 RECOMMENDATION FOR ${n.id.toUpperCase()}:\n\n${n.info}`);
    }

    function adjustValue(key, delta) {
        const n = nutrients.find(item => item.key === key);
        const dayIdx = (new Date().getDay() + 6) % 7;
        let step = (key === 'vitB12') ? 0.1 : 1;
        n.cur = parseFloat((Math.max(0, n.cur + (delta * step))).toFixed(2));
        n.weekly[dayIdx] = n.cur; 
        if (delta > 0 && n.cur >= n.norm) confetti();
        localStorage.setItem('vitality_elite_data', JSON.stringify({ nutrients, history }));
        render();
    }

    function saveData() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const dayName = dayNames['EN'][(now.getDay() + 6) % 7];
        const active = nutrients.filter(n => n.cur > 0).map(n => n.id).join(', ');
        history.unshift({ name: `Sync (${dayName})`, weight: active || "Daily Sync", time: timeStr });
        localStorage.setItem('vitality_elite_data', JSON.stringify({ nutrients, history }));
        const btnText = document.getElementById('save-text');
        btnText.innerText = "SUCCESSFULLY SAVED!";
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.9 } });
        setTimeout(() => { btnText.innerText = "SAVE & SYNC"; render(); }, 2000);
    }

    function render() {
        document.getElementById('nutrient-list').innerHTML = nutrients.map((n) => {
            const p = Math.min(100, Math.round((n.cur / n.norm) * 100));
            return `
                <div class="n-card">
                    <div class="n-info">
                        <button class="nutrient-title-btn" onclick="showRecommendation('${n.key}')">
                            <span style="font-size: 1.2rem;">${n.emoji}</span>
                            <span style="font-weight: 800;">${n.id}</span>
                        </button>
                        <div class="controls">
                            <button class="btn-inc" onclick="adjustValue('${n.key}', -1)">-</button>
                            <span style="font-weight: 900; color: ${n.color}; min-width: 45px; text-align: center;">${p}%</span>
                            <button class="btn-inc" onclick="adjustValue('${n.key}', 1)">+</button>
                        </div>
                    </div>
                    <div class="p-bar-bg"><div class="p-bar-fill" style="width: ${p}%; background: ${n.color}"></div></div>
                    <div class="week-chart">
                        ${n.weekly.map((val, i) => `
                            <div class="day-column">
                                <div class="day-bar" style="height: ${Math.min(100, (val/n.norm)*100)}%; background: ${n.color}; opacity: ${val > 0 ? 1 : 0.2}"></div>
                                <div class="day-label">${dayNames[currentLang][i]}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }).join('');

        const hList = document.getElementById('history-list');
        hList.innerHTML = history.length ? history.map(item => `
            <div class="history-item">
                <div style="max-width: 75%;"><b>${item.name}</b><br><small style="color:var(--text-dim);">${item.weight}</small></div>
                <div style="color:var(--accent); font-weight:900; font-size: 0.75rem;">${item.time}</div>
            </div>`).join('') : '<p style="text-align:center; color:var(--text-dim);">Ready for logs</p>';
    }

    function smartAnalyze() {
        const input = document.getElementById('smart-input').value;
        if(!input) return;
        adjustValue('iron', 2);
        document.getElementById('smart-input').value = '';
        render();
    }

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function toggleLang() {
        currentLang = (currentLang === 'RU') ? 'EN' : 'RU';
        document.getElementById('lang-btn').innerText = (currentLang === 'RU') ? 'EN' : 'RU';
        render();
    }
</script>
</body>
</html>
